{{- if and .Values.operator.enabled .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "podtrace.fullname" . }}-operator
  namespace: {{ include "podtrace.systemNamespace" . }}
  labels:
    {{- include "podtrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
---
# ClusterRole for the operator. These permissions must match what the
# reconcilers actually need — kept manually in sync with the kubebuilder
# rbac markers in internal/operator/*_controller.go.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "podtrace.fullname" . }}-operator
  labels:
    {{- include "podtrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  # podtrace.io CRDs. delete is required for TTL-driven cleanup of
  # expired PodTraceSession resources (sessionTTL on terminal phase)
  # and for agent-driven removal of stale PodTrace entries.
  - apiGroups: ["podtrace.io"]
    resources: ["tracerconfigs", "podtraces", "podtracesessions", "exporterconfigs", "podtraceschedules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["podtrace.io"]
    resources: ["tracerconfigs/status", "podtraces/status", "podtracesessions/status", "exporterconfigs/status", "podtraceschedules/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["podtrace.io"]
    resources: ["tracerconfigs/finalizers", "podtraces/finalizers", "podtracesessions/finalizers", "podtraceschedules/finalizers"]
    verbs: ["update"]
  # Owned workload resources
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod lookup (selector → node resolution in PodTraceSessionReconciler)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Namespace lookup for spec.namespaceSelector resolution. The operator
  # lists namespaces, filters by the user-supplied LabelSelector, and
  # writes the result into the agent bundle's target_namespaces field.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # System-namespace infrastructure: SAs, bundles (ConfigMap+Secret)
  - apiGroups: [""]
    resources: ["serviceaccounts", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Agent RBAC managed by TracerConfigReconciler
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events surface on operator errors. The read verbs are needed so the
  # operator can grant `events.watch` to per-session ServiceAccounts —
  # without them Kubernetes RBAC blocks the grant as escalation, and the
  # diagnose CLI's Kubernetes-events correlator can't start.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Leader election lease
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "podtrace.fullname" . }}-operator
  labels:
    {{- include "podtrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "podtrace.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "podtrace.fullname" . }}-operator
    namespace: {{ include "podtrace.systemNamespace" . }}
{{- end }}
