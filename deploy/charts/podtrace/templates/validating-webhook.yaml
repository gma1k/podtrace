{{- /*
   Require the operator too: the operator pod IS the webhook server. Rendering
   the ValidatingWebhookConfiguration without it (failurePolicy: Fail) makes the
   apiserver call an endpoint that does not exist, blocking every podtrace.io
   create/update cluster-wide. Gate on both so webhook.enabled without
   operator.enabled is a no-op instead of a self-inflicted outage.
*/ -}}
{{- if and .Values.webhook.enabled .Values.operator.enabled }}
---
# Validating admission webhook for podtrace.io/v1alpha1.
#
# The paths below are authoritative: they match the kubebuilder markers on
# the Go webhook types in api/v1alpha1/*_webhook.go. `make manifests`
# regenerates hack/reference/ from those markers, and the manifests-drift CI
# job fails if the committed reference is stale. Keep this hand-authored
# template in sync with hack/reference/ (a manual diff — CI does not compare
# the template against the reference automatically).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "podtrace.fullname" . }}-validating-webhook
  labels:
    {{- include "podtrace.labels" . | nindent 4 }}
  annotations:
    {{- if eq .Values.webhook.certSource "cert-manager" }}
    cert-manager.io/inject-ca-from: {{ include "podtrace.systemNamespace" . }}/{{ include "podtrace.fullname" . }}-serving-cert
    {{- end }}
webhooks:
  - name: vpodtrace.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-podtrace
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podtraces"]

  - name: vpodtracesession.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-podtracesession
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podtracesessions"]

  - name: vexporterconfig.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-exporterconfig
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["exporterconfigs"]

  - name: vpodtraceschedule.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-podtraceschedule
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podtraceschedules"]
{{- end }}
