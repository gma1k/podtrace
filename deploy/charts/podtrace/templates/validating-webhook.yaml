{{- if .Values.webhook.enabled }}
---
# Validating admission webhook for podtrace.io/v1alpha1.
#
# The paths below are authoritative: they match the kubebuilder markers on
# the Go webhook types in api/v1alpha1/*_webhook.go. If a marker changes,
# `make manifests` will emit a mismatch between the Go server and this
# template — the Makefile target regenerates the reference manifest so
# drift is caught.
#
# TLS source: cert-manager issues the Service's serving cert when
# .Values.webhook.certSource = "cert-manager" (default). The annotation
# `cert-manager.io/inject-ca-from` populates each webhook's caBundle at
# install time. For air-gapped clusters without cert-manager, switch to
# certSource=self-signed and provide .Values.webhook.caBundle / .tls.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "podtrace.fullname" . }}-validating-webhook
  labels:
    {{- include "podtrace.labels" . | nindent 4 }}
  annotations:
    {{- if eq .Values.webhook.certSource "cert-manager" }}
    cert-manager.io/inject-ca-from: {{ include "podtrace.systemNamespace" . }}/{{ include "podtrace.fullname" . }}-serving-cert
    {{- end }}
webhooks:
  - name: vpodtrace.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-podtrace
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podtraces"]

  - name: vpodtracesession.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-podtracesession
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podtracesessions"]

  - name: vexporterconfig.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-exporterconfig
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["exporterconfigs"]

  - name: vpodtraceschedule.podtrace.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: {{ include "podtrace.fullname" . }}-webhook
        namespace: {{ include "podtrace.systemNamespace" . }}
        path: /validate-podtrace-io-v1alpha1-podtraceschedule
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle }}
      {{- end }}
    rules:
      - apiGroups: ["podtrace.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podtraceschedules"]
{{- end }}
