{{- if .Values.examples.exporterconfig.enabled }}
---
# Optional starter ExporterConfig. Lets a fresh `helm install` produce
# enough scaffolding for a user to apply examples/diagnose-demo.yaml
# (or any reference manifest) without first having to author their
# own ExporterConfig CR.
#
# The endpoint is configurable but does NOT need to be reachable —
# Phase 4's reportRef sink writes the full report to a ConfigMap
# regardless of whether the exporter receives spans.
apiVersion: podtrace.io/v1alpha1
kind: ExporterConfig
metadata:
  name: {{ .Values.examples.exporterconfig.name | default "starter-otlp" }}
  namespace: {{ .Values.examples.exporterconfig.namespace | default "default" }}
  labels:
    {{- include "podtrace.labels" . | nindent 4 }}
    app.kubernetes.io/component: example
spec:
  type: otlp
  otlp:
    endpoint: {{ .Values.examples.exporterconfig.endpoint | quote }}
    protocol: {{ .Values.examples.exporterconfig.protocol | default "http" }}
    insecure: {{ .Values.examples.exporterconfig.insecure }}
{{- end }}
