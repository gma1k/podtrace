name: Setup BPF toolchain
description: |
  Install clang, llvm, libbpf-dev, and kernel headers/tools needed to
  compile the eBPF programs in bpf/ and load them via the agent's tracer.

  Single source of truth so ebpf-build, chainsaw, and security workflows
  don't drift on package lists. Superset of what any single consumer needs
  (extra packages don't hurt; missing ones break builds in subtle ways).

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          clang llvm libbpf-dev libelf-dev make pkg-config

        sudo apt-get install -y "linux-tools-$(uname -r)" \
          || sudo apt-get install -y linux-tools-generic
        sudo apt-get install -y "linux-headers-$(uname -r)" \
          || sudo apt-get install -y linux-headers-generic

        if ! bpftool version >/dev/null 2>&1; then
          sudo apt-get install -y bpftool || true
        fi
        if ! bpftool version >/dev/null 2>&1; then
          real="$(find /usr/lib/linux-tools -maxdepth 2 -name bpftool -type f 2>/dev/null | sort -V | tail -1 || true)"
          if [[ -n "${real}" ]]; then
            sudo install -m0755 "${real}" /usr/local/bin/bpftool
          fi
        fi
        bpftool version
