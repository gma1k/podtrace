name: Label Conventional PRs

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply conventional-commit label from PR title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Conventional-commit type set tracked by this workflow.
          ALL_TYPES=(feat fix perf docs test ci build chore refactor style security deprecate remove revert)

          # Conventional-commit subject regex: type(scope)?!?: subject.
          RE='^([a-z]+)(\([^)]+\))?(!)?:'

          # ── 1. Parse the PR title.
          TYPE=""
          BANG=""
          if [[ "$TITLE" =~ $RE ]]; then
            TYPE="${BASH_REMATCH[1]}"
            BANG="${BASH_REMATCH[3]}"
          fi

          # ── 2. Fetch the PR's current labels ONCE (the previous design
          # made 14+2 API calls per run; the GITHUB_TOKEN's per-job soft
          # rate limit eventually returned 401 Unauthorized).
          mapfile -t CURRENT < <(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')

          has_label() {
            local needle="$1"
            for l in "${CURRENT[@]:-}"; do
              [[ "$l" == "$needle" ]] && return 0
            done
            return 1
          }

          in_list() {
            local needle="$1"; shift
            for x in "$@"; do
              [[ "$x" == "$needle" ]] && return 0
            done
            return 1
          }

          # ── 3. Compute the labels to remove and to add. Only manage the
          # conventional-type set and the `breaking` marker — leave every
          # other label (`dependencies`, `security`, area labels from
          # .github/labeler.yml, etc.) alone.
          TO_REMOVE=()
          TO_ADD=()

          for L in "${CURRENT[@]:-}"; do
            if in_list "$L" "${ALL_TYPES[@]}" "breaking"; then
              if [[ "$L" == "breaking" ]]; then
                # Strip stale `breaking` if the title no longer has `!`.
                [[ -z "$BANG" ]] && TO_REMOVE+=("breaking")
              elif [[ "$L" != "$TYPE" ]]; then
                # Strip stale type labels that don't match the title.
                TO_REMOVE+=("$L")
              fi
            fi
          done

          if [[ -n "$TYPE" ]] && in_list "$TYPE" "${ALL_TYPES[@]}" && ! has_label "$TYPE"; then
            TO_ADD+=("$TYPE")
          fi
          if [[ -n "$BANG" ]] && ! has_label breaking; then
            TO_ADD+=("breaking")
          fi

          # ── 4. Ensure each label we intend to ADD exists in the repo
          # before the edit — gh refuses to attach an unknown label.
          for L in "${TO_ADD[@]:-}"; do
            [[ -z "$L" ]] && continue
            gh label create "$L" --repo "$REPO" --color ededed --description "conventional-commit type" >/dev/null 2>&1 || true
          done

          # ── 5. Single batched edit: at most one --remove-label and one
          # --add-label invocation, each with a comma-separated list.
          ARGS=()
          if [[ ${#TO_REMOVE[@]} -gt 0 ]]; then
            ARGS+=(--remove-label "$(IFS=','; echo "${TO_REMOVE[*]}")")
          fi
          if [[ ${#TO_ADD[@]} -gt 0 ]]; then
            ARGS+=(--add-label "$(IFS=','; echo "${TO_ADD[*]}")")
          fi

          if [[ ${#ARGS[@]} -eq 0 ]]; then
            echo "No label changes needed (current: ${CURRENT[*]:-none})."
            exit 0
          fi

          echo "Applying: ${ARGS[*]}"
          gh pr edit "$PR_NUMBER" --repo "$REPO" "${ARGS[@]}"
