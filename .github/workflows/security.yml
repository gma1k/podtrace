name: Security - CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    permissions:
      contents: read
      security-events: write
      actions: read

    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: cpp
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Install BPF toolchain
        if: matrix.language == 'cpp'
        uses: ./.github/actions/setup-bpf-toolchain

      - name: Run gosec security scanner
        if: matrix.language == 'go'
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt sarif -out gosec-results.sarif -exclude-dir=test ./... || true
          python3 - <<'EOF'
          import json, sys
          try:
              with open("gosec-results.sarif") as f:
                  sarif = json.load(f)
              for run in sarif.get("runs", []):
                  for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                      rels = rule.get("relationships", [])
                      rule["relationships"] = [
                          r if isinstance(r, dict) else {"target": {"id": str(r), "toolComponent": {"name": "gosec"}}}
                          for r in rels
                      ]
              with open("gosec-results.sarif", "w") as f:
                  json.dump(sarif, f)
          except Exception as e:
              print(f"SARIF normalization warning: {e}", file=sys.stderr)
          EOF

      - name: Upload gosec SARIF results
        if: matrix.language == 'go'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: gosec-results.sarif
          category: gosec

      - name: Build eBPF C
        if: matrix.language == 'cpp'
        run: |
          make internal/ebpf/embedded/podtrace.amd64.bpf.o BPF_GOARCH=amd64

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
