name: Release

# Triggered by version tags (vX.Y.Z, vX.Y.Z-rc.N). Builds and signs the
# multi-arch container image, packages and pushes the Helm chart to GHCR
# OCI, and attaches a one-shot quickstart manifest to the GitHub Release.
#
# Note on chaining with release-please: tags pushed by release-please via
# the default GITHUB_TOKEN do not trigger downstream workflows (GitHub
# blocks token-driven event recursion). To produce a fully-automatic
# release, either:
#   (a) Manually re-run this workflow via "Run workflow" → tag ref, or
#   (b) Configure release-please-action with a PAT that has workflow scope
#       so its tag pushes trigger this workflow on their own.
# Option (a) requires zero setup; option (b) is the long-term cleanup.

on:
  push:
    tags: ["v*", "test*"]
  workflow_dispatch:
    inputs:
      olm_bundle_only:
        description: "Use to re-submit community-operators."
        type: boolean
        default: false
      version:
        description: "Version to submit when olm_bundle_only=true. Ignored otherwise; tag push uses github.ref_name."
        type: string
        required: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/gma1k/podtrace
  CHART_PATH: deploy/charts/podtrace
  CHART_REPO: ghcr.io/gma1k/charts
  COSIGN_VERSION: v3.0.6
  HELM_VERSION: v4.2.3
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bpf-objects:
    if: ${{ !inputs.olm_bundle_only }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install BPF toolchain
        uses: ./.github/actions/setup-bpf-toolchain
      - name: Build native BPF object (full kernel BTF)
        run: make internal/ebpf/embedded/podtrace.${{ matrix.goarch }}.bpf.o BPF_GOARCH=${{ matrix.goarch }}
      - name: Refuse a stub fallback on the native runner
        run: |
          lines=$(wc -l < bpf/.generated/vmlinux.h)
          if [ "$lines" -lt 1000 ]; then
            echo "ERROR: ${{ matrix.goarch }} object fell back to the stub (vmlinux.h=$lines lines); a native runner must have full BTF" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bpf-object-${{ matrix.goarch }}
          path: internal/ebpf/embedded/podtrace.${{ matrix.goarch }}.bpf.o
          if-no-files-found: error
          retention-days: 1

  image:
    needs: bpf-objects
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && !inputs.olm_bundle_only
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Generate BTF vmlinux.h for the build context
        run: |
          sudo apt-get update
          sudo apt-get install -y "linux-tools-$(uname -r)" || sudo apt-get install -y linux-tools-generic
          make bpf-btf-header
          wc -l bpf/.generated/vmlinux.h

      - name: Stage native BPF objects into the build context
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: bpf-object-*
          path: internal/ebpf/embedded
          merge-multiple: true

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            REQUIRE_BTF=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for t in $TAGS; do
            cosign sign --yes "${t}@${DIGEST}"
          done

  chart:
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && !inputs.olm_bundle_only
    runs-on: ubuntu-latest
    needs: image
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: package
        name: Lint, package, push
        run: |
          set -euo pipefail
          helm lint ${{ env.CHART_PATH }}
          mkdir -p dist
          helm package ${{ env.CHART_PATH }} -d dist/
          tgz=$(ls dist/podtrace-*.tgz | head -n1)
          version=$(helm show chart ${{ env.CHART_PATH }} | awk '/^version:/{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          helm push "$tgz" oci://${{ env.CHART_REPO }} 2>&1 | tee push.log
          digest=$(grep '^Digest:' push.log | awk '{print $2}')
          if [ -z "$digest" ]; then
            echo "::error::could not extract chart digest from helm push output"
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign chart (keyless)
        run: |
          cosign sign --yes \
            "${{ env.CHART_REPO }}/podtrace@${{ steps.package.outputs.digest }}"

      - uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d  # v2.0.1
        with:
          version: 1.3.1

      - name: Push Artifact Hub verification artifact
        working-directory: ${{ env.CHART_PATH }}
        run: |
          set -euo pipefail
          oras push \
            ${{ env.CHART_REPO }}/podtrace:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

  quickstart:
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && !inputs.olm_bundle_only
    runs-on: ubuntu-latest
    needs: chart
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Render quickstart manifests
        run: |
          set -euo pipefail
          mkdir -p dist
          cat > dist/quickstart.yaml <<'NSEOF'
          apiVersion: v1
          kind: Namespace
          metadata:
            name: podtrace-system
            labels:
              app.kubernetes.io/managed-by: podtrace-quickstart
          NSEOF
          echo "---" >> dist/quickstart.yaml
          helm template podtrace ${{ env.CHART_PATH }} \
            --namespace podtrace-system \
            --include-crds \
            --set namespace.create=true \
            --set operator.enabled=true \
            >> dist/quickstart.yaml
          cp deploy/quickstart-sample.yaml dist/quickstart-demo.yaml
          echo "Rendered $(wc -l < dist/quickstart.yaml) + $(wc -l < dist/quickstart-demo.yaml) lines"

      - name: Compute checksum
        run: |
          cd dist
          sha256sum quickstart.yaml > quickstart.yaml.sha256
          sha256sum quickstart-demo.yaml > quickstart-demo.yaml.sha256

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            dist/quickstart.yaml
            dist/quickstart.yaml.sha256
            dist/quickstart-demo.yaml
            dist/quickstart-demo.yaml.sha256
          fail_on_unmatched_files: true

  cli:
    needs: bpf-objects
    if: ${{ !inputs.olm_bundle_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install BPF toolchain
        uses: ./.github/actions/setup-bpf-toolchain

      - name: Verify the release builds against full kernel BTF
        run: |
          make bpf-btf-header
          lines=$(wc -l < bpf/.generated/vmlinux.h)
          if [ "$lines" -lt 1000 ]; then
            echo "ERROR: vmlinux.h has only $lines lines — stub fallback; refusing to release stub-built binaries" >&2
            exit 1
          fi

      - name: Stage native BPF objects (reused by make release)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: bpf-object-*
          path: internal/ebpf/embedded
          merge-multiple: true

      - name: Build CLI tarballs (linux+darwin x amd64+arm64)
        run: make release VERSION=${{ github.ref_name }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign checksums.txt (cosign keyless)
        working-directory: release
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle.json \
            checksums.txt

      - name: Attach tarballs + checksums + signature to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: |
            release/podtrace_*.tar.gz
            release/checksums.txt
            release/checksums.txt.bundle.json
          fail_on_unmatched_files: true
          prerelease: ${{ startsWith(github.ref_name, 'test') || contains(github.ref_name, '-') }}

      - name: Update plugin manifest in krew-index
        id: krew_submit
        if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && !startsWith(github.ref_name, 'test')
        continue-on-error: true
        uses: rajatjindal/krew-release-bot@c970b8a8f6dbc2f2285a26e3ae160903b87002c3  # v0.0.51

      - name: Treat existing krew-index PR as idempotent success
        if: |
          steps.krew_submit.outcome == 'failure' &&
          startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          branch="gma1k-podtrace-podtrace-${VERSION}"
          existing=$(gh api repos/kubernetes-sigs/krew-index/pulls --paginate \
            --jq "[.[] | select(.head.ref == \"${branch}\")] | length")
          if [ "${existing:-0}" -eq 0 ]; then
            echo "::error::krew-release-bot failed and no PR exists upstream for ${VERSION}"
            exit 1
          fi
          echo "krew-index PR for ${VERSION} already exists — treating bot failure as idempotent re-run"

  olm-bundle:
    needs: image
    if: |
      !cancelled() && (needs.image.result == 'success' || needs.image.result == 'skipped') && (
        (github.event_name == 'workflow_dispatch' && inputs.olm_bundle_only && startsWith(inputs.version, 'v') && !contains(inputs.version, '-'))
        || (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && !startsWith(github.ref_name, 'test'))
      )
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ (github.event_name == 'workflow_dispatch' && inputs.olm_bundle_only) && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Compute previous version from upstream catalog
        id: prev
        env:
          GH_TOKEN: ${{ secrets.OPERATORHUB_PAT }}
        run: |
          set -euo pipefail
          current="${VERSION#v}"
          prev=$(gh api "repos/k8s-operatorhub/community-operators/contents/operators/podtrace" \
                  --jq '[.[] | select(.type=="dir") | .name] | map(select(test("^[0-9]"))) | sort_by(split(".") | map(tonumber)) | last' \
                  2>/dev/null || echo "")
          if [[ "${prev}" == "${current}" ]]; then
            echo "::error::upstream already has ${current}; refusing to re-submit"
            exit 1
          fi
          echo "previous=${prev}" >> "$GITHUB_OUTPUT"
          echo "Computed PREVIOUS_VERSION=${prev:-<none>} (current=${current})"

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Submit bundle to community-operators
        env:
          GH_TOKEN: ${{ secrets.OPERATORHUB_PAT }}
          PREVIOUS_VERSION: ${{ steps.prev.outputs.previous }}
        run: ./scripts/submit-olm-bundle.sh
