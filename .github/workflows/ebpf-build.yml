name: eBPF Build

on:
  push:
    branches: ["**"]
    paths:
      - "bpf/**"
      - "**/*.c"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Makefile"
  pull_request:
    branches: ["**"]
    paths:
      - "bpf/**"
      - "**/*.c"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Makefile"
      
jobs:
  build-ebpf:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
            bpf_arch: x86
          - runner: ubuntu-24.04-arm
            goarch: arm64
            bpf_arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev \
            linux-headers-$(uname -r) linux-tools-$(uname -r) \
            || sudo apt-get install -y clang llvm libbpf-dev \
            linux-headers-generic linux-tools-generic

      - name: Install Go dependencies
        run: GOTOOLCHAIN=auto go mod download && GOTOOLCHAIN=auto go mod verify

      - name: Compile eBPF program
        run: |
          make bpf/podtrace.bpf.o BPF_GOARCH=${{ matrix.goarch }}
          echo "eBPF object compiled via Makefile (arch=${{ matrix.bpf_arch }})"

      - name: Build Go binary
        run: GOTOOLCHAIN=auto GOARCH=${{ matrix.goarch }} go build -o bin/podtrace ./cmd/podtrace

      - name: List outputs
        run: |
          echo "=== eBPF object (arch=${{ matrix.bpf_arch }}) ==="
          ls -lh bpf/podtrace.bpf.o
          echo "=== Go binary (goarch=${{ matrix.goarch }}) ==="
          ls -lh bin/podtrace
          file bin/podtrace
