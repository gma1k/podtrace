name: eBPF Build

on:
  pull_request:
    branches: ["**"]
    paths:
      - "bpf/**"
      - "**/*.c"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Makefile"
      - ".github/workflows/ebpf-build.yml"
      - ".github/actions/setup-bpf-toolchain/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-ebpf:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goarch: amd64
            bpf_arch: x86
          - runner: ubuntu-24.04-arm
            goarch: arm64
            bpf_arch: arm64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install BPF toolchain
        uses: ./.github/actions/setup-bpf-toolchain

      - name: Install Go dependencies
        run: GOTOOLCHAIN=auto go mod download && GOTOOLCHAIN=auto go mod verify

      - name: Compile eBPF program
        run: |
          make internal/ebpf/embedded/podtrace.${{ matrix.goarch }}.bpf.o BPF_GOARCH=${{ matrix.goarch }}
          echo "eBPF object compiled via Makefile (arch=${{ matrix.bpf_arch }})"

      - name: Build Go binary
        run: GOTOOLCHAIN=auto GOARCH=${{ matrix.goarch }} go build -o bin/podtrace ./cmd/podtrace

      - name: Run embed smoke test
        run: GOTOOLCHAIN=auto GOARCH=${{ matrix.goarch }} go test -tags embed_bpf ./internal/ebpf/embedded/...

      - name: List outputs
        run: |
          echo "=== eBPF object (arch=${{ matrix.bpf_arch }}) ==="
          ls -lh internal/ebpf/embedded/podtrace.*.bpf.o
          echo "=== Go binary (goarch=${{ matrix.goarch }}) ==="
          ls -lh bin/podtrace
          file bin/podtrace
