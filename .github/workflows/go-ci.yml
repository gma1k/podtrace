name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Makefile"
      - ".github/workflows/go-ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Makefile"
      - ".github/workflows/go-ci.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version: [1.26]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: GOTOOLCHAIN=auto go mod download

      - name: Run golangci-lint
        timeout-minutes: 5
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Run govulncheck
        timeout-minutes: 5
        run: |
          GOTOOLCHAIN=auto go install golang.org/x/vuln/cmd/govulncheck@latest
          GOTOOLCHAIN=auto govulncheck ./...

      - name: Build
        timeout-minutes: 5
        run: GOTOOLCHAIN=auto go build ./...

      - name: Run unit tests
        timeout-minutes: 15
        run: |
          rm -f coverage.out coverage-*.out
          GOTOOLCHAIN=auto go test \
            -short -race -parallel=4 -timeout=10m \
            -coverprofile=coverage.out -covermode=atomic \
            ./cmd/... ./internal/...

      # NO -short here: every integration test skips itself in short mode,
      # so the old invocation was a permanently green, permanently empty
      # suite.
      - name: Run integration suite
        timeout-minutes: 5
        run: |
          GOTOOLCHAIN=auto go test \
            -tags=integration -timeout=5m \
            ./test/...

      - name: Generate coverage report
        if: always()
        run: |
          if [ -f coverage.out ]; then
            GOTOOLCHAIN=auto go tool cover -html=coverage.out -o coverage.html || true
            GOTOOLCHAIN=auto go tool cover -func=coverage.out | tail -1
          else
            echo "::warning::Coverage file not found, skipping coverage report"
          fi

      - name: Check coverage threshold
        if: always()
        run: |
          if [ ! -f coverage.out ]; then
            echo "::warning::Coverage file not found, skipping coverage check"
            exit 0
          fi
          COVERAGE=$(GOTOOLCHAIN=auto go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//' || echo "0")
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l 2>/dev/null || echo "1") )); then
            echo "Coverage $COVERAGE% is below 70% threshold"
            echo "::warning::Test coverage is below 70% threshold"
          else
            echo "Coverage $COVERAGE% meets threshold"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        if: hashFiles('coverage.out') != ''
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  cross-compile:
    # Also run on push to main (scoped by `on.push.branches`) so a merged
    # commit — which may differ from the tested PR head after squash/rebase —
    # is verified before a release is cut from it.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: GOTOOLCHAIN=auto go build ./...

  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: GOTOOLCHAIN=auto go mod download

      - name: Run benchmarks
        run: |
          GOTOOLCHAIN=auto go test -bench=. -benchmem ./... | tee benchmark.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: benchmark-results
          path: benchmark.txt

  # Drift gate: the Makefile generates CRDs (templates/crds) and the reference
  # webhook manifest (hack/reference) from the api types + kubebuilder markers.
  # Without this job a change to a marker or CRD type could merge with stale
  # committed manifests. Regenerate and fail if anything differs.
  manifests-drift:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate CRDs, deepcopy, and webhook reference
        run: GOTOOLCHAIN=auto make manifests generate

      - name: Fail on manifest drift
        run: |
          if ! git diff --exit-code -- deploy/charts/podtrace/templates/crds hack/reference api/v1alpha1; then
            echo "::error::Generated manifests are stale. Run 'make manifests generate' and commit the result." >&2
            exit 1
          fi
