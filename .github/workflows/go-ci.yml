name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Makefile"
      - ".github/workflows/go-ci.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "cmd/**"
      - "internal/**"
      - "Makefile"
      - ".github/workflows/go-ci.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        go-version: [1.25]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: GOTOOLCHAIN=auto go mod download

      - name: Run golangci-lint
        timeout-minutes: 5
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.7.2
          args: --timeout=5m

      - name: Run govulncheck
        timeout-minutes: 5
        run: |
          GOTOOLCHAIN=auto go install golang.org/x/vuln/cmd/govulncheck@latest
          GOTOOLCHAIN=auto govulncheck ./...

      - name: Build
        timeout-minutes: 5
        run: GOTOOLCHAIN=auto go build ./...

      - name: Run unit tests
        timeout-minutes: 10
        run: |
          rm -f coverage.out coverage-*.out
          GOTOOLCHAIN=auto go test \
            -short -race -parallel=4 -timeout=10m \
            -coverprofile=coverage.out -covermode=atomic \
            ./cmd/... ./internal/...

      - name: Run integration suite
        timeout-minutes: 5
        run: |
          GOTOOLCHAIN=auto go test \
            -short -tags=integration -timeout=5m \
            ./test/...

      - name: Generate coverage report
        if: always()
        run: |
          if [ -f coverage.out ]; then
            GOTOOLCHAIN=auto go tool cover -html=coverage.out -o coverage.html || true
            GOTOOLCHAIN=auto go tool cover -func=coverage.out | tail -1
          else
            echo "::warning::Coverage file not found, skipping coverage report"
          fi

      - name: Check coverage threshold
        if: always()
        run: |
          if [ ! -f coverage.out ]; then
            echo "::warning::Coverage file not found, skipping coverage check"
            exit 0
          fi
          COVERAGE=$(GOTOOLCHAIN=auto go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//' || echo "0")
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l 2>/dev/null || echo "1") )); then
            echo "Coverage $COVERAGE% is below 70% threshold"
            echo "::warning::Test coverage is below 70% threshold"
          else
            echo "Coverage $COVERAGE% meets threshold"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        if: hashFiles('coverage.out') != ''
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  cross-compile:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: GOTOOLCHAIN=auto go build ./...

  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: GOTOOLCHAIN=auto go mod download

      - name: Run benchmarks
        run: |
          GOTOOLCHAIN=auto go test -bench=. -benchmem ./... | tee benchmark.txt || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: benchmark-results
          path: benchmark.txt
