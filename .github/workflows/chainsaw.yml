name: Chainsaw e2e

on:
  pull_request:
    branches: ["**"]
    paths:
      - "api/v1alpha1/**"
      - "cmd/podtrace/**"
      - "internal/operator/**"
      - "internal/agent/**"
      - "deploy/charts/podtrace/**"
      - "test/chainsaw/**"
      - "test/e2e/**"
      - "deploy/quickstart-sample.yaml"
      - "Makefile"
      - "Dockerfile"
      - ".github/workflows/chainsaw.yml"
      - ".github/actions/setup-bpf-toolchain/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  chainsaw:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL \
            /usr/local/lib/android /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: podtrace-chainsaw
          config: ./test/chainsaw/kind-config.yaml
          version: v0.24.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: v4.2.3

      - name: Install chainsaw
        run: |
          # v0.2.14 predates Go 1.26's testing.testDeps gaining the
          # ModulePath() method; pin >= v0.2.15 to compile under Go 1.26.
          go install github.com/kyverno/chainsaw@v0.2.15
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install BPF toolchain
        uses: ./.github/actions/setup-bpf-toolchain

      - name: Build podtrace image
        run: |
          make docker-build IMAGE_TAG=ci
          kind load docker-image ghcr.io/gma1k/podtrace:ci \
            --name podtrace-chainsaw

      - name: Build HTTP/2 + Go-TLS workload image
        run: |
          docker build --provenance=false \
            -t podtrace-h2demo:ci \
            test/chainsaw/tests/h2-capture/workload
          kind load docker-image podtrace-h2demo:ci --name podtrace-chainsaw

      - name: Build HTTP/3 workload images
        run: |
          docker build --provenance=false \
            -t podtrace-h3curl:ci \
            test/chainsaw/tests/h3-adapter-capture/workload-curl
          for i in 1 2 3; do
            docker pull nginx:1.29 && break
            echo "pull attempt $i failed; retrying in 15s" >&2
            sleep 15
          done
          kind load docker-image podtrace-h3curl:ci --name podtrace-chainsaw
          kind load docker-image nginx:1.29 --name podtrace-chainsaw

      - name: Preload hook-job image into kind
        run: |
          for i in 1 2 3; do
            docker pull alpine/k8s:1.30.4 && break
            echo "pull attempt $i failed; retrying in 15s" >&2
            sleep 15
          done
          kind load docker-image alpine/k8s:1.30.4 --name podtrace-chainsaw

      - name: Install operator via Helm
        run: |
          kubectl create namespace podtrace-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace podtrace-system \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/audit=privileged \
            pod-security.kubernetes.io/warn=privileged \
            --overwrite

          timeout 420 helm install podtrace deploy/charts/podtrace \
            --namespace podtrace-system \
            --set namespace.create=false \
            --set operator.enabled=true \
            --set image.repository=ghcr.io/gma1k/podtrace \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --wait --timeout 180s

          for i in $(seq 1 60); do
            if kubectl -n podtrace-system get ds podtrace-agent >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          kubectl -n podtrace-system rollout status ds/podtrace-agent --timeout=180s

      - name: Run chainsaw suite
        run: make chainsaw

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl -n podtrace-system get pods,ds,deploy,cm,secret 2>&1 || true
          kubectl -n podtrace-system describe pods 2>&1 | tail -200 || true
          kubectl -n podtrace-system logs deploy/podtrace-operator --tail=200 || true

  quickstart-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: podtrace-quickstart
          config: ./test/chainsaw/kind-config.yaml
          version: v0.24.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: v4.2.3

      - name: Install BPF toolchain
        uses: ./.github/actions/setup-bpf-toolchain

      - name: Build podtrace image
        run: |
          make docker-build IMAGE_TAG=ci
          kind load docker-image ghcr.io/gma1k/podtrace:ci \
            --name podtrace-quickstart

      - name: Run quickstart smoke
        env:
          PODTRACE_IMAGE_REPO: ghcr.io/gma1k/podtrace
          PODTRACE_IMAGE_TAG: ci
        run: ./test/e2e/quickstart-smoke.sh

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get pods -A || true
          kubectl -n podtrace-system describe deploy/podtrace-operator || true
          kubectl -n podtrace-system logs deploy/podtrace-operator --tail=100 || true
          kubectl -n podtrace-demo get podtracesession -o yaml || true
