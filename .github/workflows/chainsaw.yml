name: Chainsaw e2e

on:
  pull_request:
    branches: ["**"]
    paths:
      - "api/v1alpha1/**"
      - "cmd/podtrace/**"
      - "internal/operator/**"
      - "internal/agent/**"
      - "deploy/charts/podtrace/**"
      - "test/chainsaw/**"
      - "test/e2e/**"
      - "deploy/quickstart-sample.yaml"
      - "Makefile"
      - "Dockerfile"
      - ".github/workflows/chainsaw.yml"
      - ".github/actions/setup-bpf-toolchain/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  chainsaw:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: podtrace-chainsaw
          config: ./test/chainsaw/kind-config.yaml
          version: v0.24.0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v4.2.0

      - name: Install chainsaw
        run: |
          # v0.2.14 predates Go 1.26's testing.testDeps gaining the
          # ModulePath() method; pin >= v0.2.15 to compile under Go 1.26.
          go install github.com/kyverno/chainsaw@v0.2.15
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install BPF toolchain
        uses: ./.github/actions/setup-bpf-toolchain

      - name: Build podtrace image
        run: |
          make docker-build IMAGE_TAG=ci
          kind load docker-image ghcr.io/gma1k/podtrace:ci \
            --name podtrace-chainsaw

      - name: Install operator via Helm
        run: |
          kubectl create namespace podtrace-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace podtrace-system \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/audit=privileged \
            pod-security.kubernetes.io/warn=privileged \
            --overwrite

          helm install podtrace deploy/charts/podtrace \
            --namespace podtrace-system \
            --set namespace.create=false \
            --set operator.enabled=true \
            --set image.repository=ghcr.io/gma1k/podtrace \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --wait --timeout 180s

          for i in $(seq 1 60); do
            if kubectl -n podtrace-system get ds podtrace-agent >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          kubectl -n podtrace-system rollout status ds/podtrace-agent --timeout=180s

      - name: Run chainsaw suite
        run: make chainsaw

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl -n podtrace-system get pods,ds,deploy,cm,secret 2>&1 || true
          kubectl -n podtrace-system describe pods 2>&1 | tail -200 || true
          kubectl -n podtrace-system logs deploy/podtrace-operator --tail=200 || true

  # Guards the released quickstart manifests: quickstart.yaml must apply in a
  # SINGLE kubectl invocation on a fresh cluster (explicit Namespace, no CRs
  # racing their CRDs) and the demo manifest must complete end to end. This
  # script existed but was never wired into CI, which is how a broken
  # quickstart shipped undetected.
  quickstart-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: podtrace-quickstart
          config: ./test/chainsaw/kind-config.yaml
          version: v0.24.0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v4.2.0

      - name: Install BPF toolchain
        uses: ./.github/actions/setup-bpf-toolchain

      - name: Build podtrace image
        run: |
          make docker-build IMAGE_TAG=ci
          kind load docker-image ghcr.io/gma1k/podtrace:ci \
            --name podtrace-quickstart

      - name: Run quickstart smoke
        env:
          PODTRACE_IMAGE_REPO: ghcr.io/gma1k/podtrace
          PODTRACE_IMAGE_TAG: ci
        run: ./test/e2e/quickstart-smoke.sh

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl get pods -A || true
          kubectl -n podtrace-system describe deploy/podtrace-operator || true
          kubectl -n podtrace-system logs deploy/podtrace-operator --tail=100 || true
          kubectl -n podtrace-demo get podtracesession -o yaml || true
