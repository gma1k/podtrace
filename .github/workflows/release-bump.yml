name: Release-As

# Triggers a specific release version by landing a one-shot `Release-As:` commit
# footer on main. release-please consumes the footer on its next run and opens a
# release PR for that exact version.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target version, semver, no leading v (e.g. 0.14.1, 0.15.0, 1.0.0-rc.1)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  open-release-as-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Version must be semver without leading v (got: '$VERSION'). Examples: 0.14.1, 0.15.0, 1.0.0-rc.1"
            exit 1
          fi

      - name: Guard against footer-stripping squash setting
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
        run: |
          set -euo pipefail
          MODE=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.squash_merge_commit_message')
          if [[ "$MODE" != "COMMIT_MESSAGES" ]]; then
            echo "::error::squash_merge_commit_message is '$MODE' — a squash merge would drop the Release-As footer. Set it to COMMIT_MESSAGES, or merge the release-as PR with 'Rebase' or 'Create a merge commit'."
            exit 1
          fi

      - name: Open Release-As PR
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
        run: |
          set -euo pipefail
          BRANCH="release-as/${VERSION}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "${BRANCH}"
          git commit --allow-empty \
            -m "chore: release ${VERSION}" \
            -m "Forces release-please to cut v${VERSION} on its next run." \
            -m "Release-As: ${VERSION}"
          git push -u origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore: release ${VERSION}" \
            --body "Lands a one-shot \`Release-As: ${VERSION}\` commit footer on \`main\`.

          ## What happens after this PR merges

          1. release-please sees the \`Release-As:\` footer on its next run (any push to \`main\`).
          2. It opens \`chore(release): release ${VERSION}\` bumping CHANGELOG / Chart.yaml / manifest to \`${VERSION}\`.
          3. Merging that PR tags \`v${VERSION}\` and runs the release pipeline (image, chart, Krew, OLM bundle).

          The footer is consumed once and lives only in git history, no config field is touched, so there is nothing to clean up and the trigger cannot get stuck. Merge this PR with any strategy (squash is safe on this repo: COMMIT_MESSAGES)."
