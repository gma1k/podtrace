# SeaweedFS S3 gateway. Single-pod, in-memory volume — fine for tests.
# Uses the all-in-one "server" mode so a single container speaks the
# S3 API on port 8333. The static admin/admin keys live in a Secret the
# session pod reads as its CredentialsSecretRef.
apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-s3-creds
type: Opaque
stringData:
  access_key_id: chainsaw
  secret_access_key: chainsawSecretKey
  endpoint: http://seaweedfs.objectstore-upload-test.svc.cluster.local:8333
  region: us-east-1
  force_path_style: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-s3-config
data:
  config.json: |
    {
      "identities": [
        {
          "name": "chainsaw",
          "credentials": [
            {
              "accessKey": "chainsaw",
              "secretKey": "chainsawSecretKey"
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
spec:
  selector:
    app: seaweedfs
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
    - name: master
      port: 9333
      targetPort: 9333
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:3.93
          args:
            - server
            - -dir=/data
            - -master.volumeSizeLimitMB=64
            - -s3
            - -s3.port=8333
            - -s3.config=/etc/seaweedfs/config.json
          ports:
            - name: s3
              containerPort: 8333
            - name: master
              containerPort: 9333
          readinessProbe:
            tcpSocket:
              port: 8333
            initialDelaySeconds: 3
            periodSeconds: 2
          volumeMounts:
            - name: config
              mountPath: /etc/seaweedfs
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: seaweedfs-s3-config
        - name: data
          emptyDir: {}