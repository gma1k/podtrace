apiVersion: v1
kind: Secret
metadata:
  name: dd-creds
type: Opaque
stringData:
  api_key: initial-key
---
apiVersion: podtrace.io/v1alpha1
kind: ExporterConfig
metadata:
  name: rotation-dd
spec:
  type: datadog
  datadog:
    site: datadoghq.com
    apiKeySecretRef:
      name: dd-creds
      key: api_key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rotation-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rotation-target
  template:
    metadata:
      labels:
        app: rotation-target
    spec:
      containers:
        - name: app
          image: registry.k8s.io/pause:3.9
---
apiVersion: podtrace.io/v1alpha1
kind: PodTrace
metadata:
  name: rotation-pt
spec:
  selector:
    matchLabels:
      app: rotation-target
  filters: [dns]
  exporterRef:
    name: rotation-dd