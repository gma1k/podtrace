---
apiVersion: podtrace.io/v1alpha1
kind: ExporterConfig
metadata:
  name: alert-otlp
spec:
  type: otlp
  otlp:
    endpoint: otel-collector:4318
    protocol: http
---
apiVersion: podtrace.io/v1alpha1
kind: PodTrace
metadata:
  name: cpu-burn-trace
spec:
  selector:
    matchLabels:
      trace: cpu
  filters: [cpu]
  exporterRef:
    name: alert-otlp