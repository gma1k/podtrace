apiVersion: podtrace.io/v1alpha1
kind: ExporterConfig
metadata:
  name: http-otlp
spec:
  type: otlp
  otlp:
    endpoint: otel-collector:4318
    protocol: http
    insecure: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-server
  template:
    metadata:
      labels:
        app: http-server
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: http-server
spec:
  selector:
    app: http-server
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-target
  template:
    metadata:
      labels:
        app: http-target
    spec:
      containers:
        - name: curl
          image: curlimages/curl:8.9.1
          command:
            - sh
            - -c
            - |
              while true; do
                curl -s -o /dev/null http://http-server/ || true
                curl -s -o /dev/null http://http-server/api/missing || true
                sleep 1
              done