apiVersion: podtrace.io/v1alpha1
kind: ExporterConfig
metadata:
  name: ec-status-splunk
status:
  (conditions[?type == 'Ready'].status | [0]): "False"
  (conditions[?type == 'Ready'].reason | [0]): SecretMissing
  (conditions[?type == 'Ready'].message | [0]):
    (contains(@, 'ec-status-secret')): true
