apiVersion: v1
kind: Pod
metadata:
  name: psa-probe
  namespace: podtrace-system
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: registry.k8s.io/pause:3.9
      securityContext:
        privileged: true
        runAsUser: 0
        capabilities:
          add: ["BPF", "SYS_ADMIN"]
