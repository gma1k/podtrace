apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: schedule-cr-lifecycle
spec:
  description: |
    End-to-end PodTraceSchedule loop:
      1. Apply ExporterConfig + Deployment + PodTraceSchedule with a
         per-minute cron and a short (10s) session duration.
      2. Controller fires a PodTraceSession owned by the schedule.
      3. Session reaches phase=Completed.
      4. status.lastScheduleTime is populated on the schedule.
      5. Suspending the schedule stops new fires.
  timeouts:
    apply: 30s
    assert: 180s
    delete: 60s
    cleanup: 120s
  steps:
    - name: setup-workload
      try:
        - apply:
            file: ./resources.yaml
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: schedule-chatty
              status:
                readyReplicas: 1

    - name: apply-schedule
      try:
        - apply:
            file: ./schedule.yaml
        - assert:
            file: ./assert-fired.yaml

    - name: suspend-schedule
      try:
        - patch:
            resource:
              apiVersion: podtrace.io/v1alpha1
              kind: PodTraceSchedule
              metadata:
                name: every-minute
              spec:
                suspend: true
        - assert:
            resource:
              apiVersion: podtrace.io/v1alpha1
              kind: PodTraceSchedule
              metadata:
                name: every-minute
              status:
                (length(conditions[?type == 'Paused' && status == 'True'])): 1
    - name: no-new-fires-while-suspended
      description: |
        The Paused condition only proves the controller acknowledged the
        suspend; it does not prove fires stopped. Record lastScheduleTime,
        wait past a full cron period, and assert it did not advance and no
        new owned session appeared.
      try:
        - script:
            timeout: 120s
            content: |
              set -eu
              before=$(kubectl -n "$NAMESPACE" get podtraceschedule every-minute \
                -o jsonpath='{.status.lastScheduleTime}')
              sessions_before=$(kubectl -n "$NAMESPACE" get podtracesession \
                -l podtrace.io/schedule=every-minute --no-headers 2>/dev/null | wc -l)
              # Cron is per-minute; wait past one tick plus slack.
              sleep 75
              after=$(kubectl -n "$NAMESPACE" get podtraceschedule every-minute \
                -o jsonpath='{.status.lastScheduleTime}')
              sessions_after=$(kubectl -n "$NAMESPACE" get podtracesession \
                -l podtrace.io/schedule=every-minute --no-headers 2>/dev/null | wc -l)
              if [ "$before" != "$after" ]; then
                echo "suspended schedule still fired: lastScheduleTime $before -> $after" >&2
                exit 1
              fi
              if [ "$sessions_before" != "$sessions_after" ]; then
                echo "suspended schedule created sessions: $sessions_before -> $sessions_after" >&2
                exit 1
              fi
              echo "ok: no new fires while suspended (lastScheduleTime=$after, sessions=$sessions_after)"
