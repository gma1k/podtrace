apiVersion: podtrace.io/v1alpha1
kind: PodTrace
metadata:
  name: degraded-pt
status:
  (conditions[?type == 'Degraded'].status | [0]): "True"
  (conditions[?type == 'Degraded'].reason | [0]): AgentNodeStatus
  (conditions[?type == 'Degraded'].message | [0]):
    (contains(@, 'OpenTelemetry Collector')): true
  nodeStatus:
  - ready: false
    (contains(message, 'OpenTelemetry Collector')): true