apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: exporter-degraded-surface
spec:
  description: |
    Property tested: when an agent cannot build an exporter for a CR,
    the failure is visible on kubectl describe, Degraded=True with
    Reason=ExporterBuildFailed (the closed-enum NodeStatusReason the
    agent stamps and the operator lifts into the rolled-up condition),
    NodeStatus row Ready=false carries the same reason plus a useful
    free-text Message.
  timeouts:
    apply: 30s
    assert: 180s
  steps:
    - name: setup
      try:
        - apply:
            file: ./resources.yaml

    - name: degraded-surfaces
      try:
        - assert:
            file: ./assert-degraded.yaml
